services:
  postgres:
    image: postgres:16-alpine
    container_name: lifepilot-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifepilot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifepilot_secure_password_replace_me}
      POSTGRES_DB: ${POSTGRES_DB:-lifepilot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifepilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lifepilot_user} -d $${POSTGRES_DB:-lifepilot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lifepilot-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password_replace_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lifepilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password_replace_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifepilot-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=${PROJECT_NAME:-LifePilot AI}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - BACKEND_PORT=8000
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-lifepilot_user}:${POSTGRES_PASSWORD:-lifepilot_secure_password_replace_me}@postgres:5432/${POSTGRES_DB:-lifepilot_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_replace_me}@redis:6379/0
      - EMBEDDING_PROVIDER=mock
      - VECTOR_PROVIDER=chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lifepilot-network
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifepilot-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lifepilot-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lifepilot-network:
    driver: bridge
