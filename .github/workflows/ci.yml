name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  frontend-verify:
    name: Frontend Lint & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run ESLint Check
        run: npm run lint
        working-directory: ./frontend

  backend-verify:
    name: Backend Lint & Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lifepilot_user
          POSTGRES_PASSWORD: lifepilot_secure_password_replace_me
          POSTGRES_DB: lifepilot_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.4.1'
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        id: cached-poetry-dependencies
        with:
          path: ./backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('./backend/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root
        working-directory: ./backend

      - name: Check imports (isort)
        run: poetry run isort . --check-only
        working-directory: ./backend

      - name: Check code style (Black)
        run: poetry run black . --check
        working-directory: ./backend

      - name: Lint code (Ruff)
        run: poetry run ruff check .
        working-directory: ./backend

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client redis-tools
          until pg_isready -h localhost -p 5432 -U lifepilot_user; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          until redis-cli -h localhost -p 6379 ping; do
            echo "Waiting for Redis..."
            sleep 2
          done

      - name: Run Alembic Migrations
        run: poetry run alembic upgrade head
        working-directory: ./backend
        env:
          ENVIRONMENT: local
          DATABASE_URL: postgresql+asyncpg://lifepilot_user:lifepilot_secure_password_replace_me@localhost:5432/lifepilot_db_test

      - name: Run pytest Suite
        run: poetry run pytest
        working-directory: ./backend
        env:
          ENVIRONMENT: local
          DATABASE_URL: postgresql+asyncpg://lifepilot_user:lifepilot_secure_password_replace_me@localhost:5432/lifepilot_db_test
          REDIS_URL: redis://localhost:6379/0
          EMBEDDING_PROVIDER: mock
          VECTOR_PROVIDER: chroma

  docker-verify:
    name: Docker Build & Verification
    runs-on: ubuntu-latest
    needs: [frontend-verify, backend-verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Production Image
        run: docker build -t lifepilot-backend:test ./backend

      - name: Build Frontend Production Image
        run: docker build -t lifepilot-frontend:test ./frontend

      - name: Verify Backend Container Spin-up & Health
        run: |
          # Start backing services (PostgreSQL & Redis)
          docker run --name mock-postgres \
            -e POSTGRES_PASSWORD=lifepilot_secure_password_replace_me \
            -e POSTGRES_USER=lifepilot_user \
            -e POSTGRES_DB=lifepilot_db \
            -d -p 5432:5432 postgres:16-alpine
          docker run --name mock-redis -d -p 6379:6379 \
            redis:7-alpine redis-server --requirepass redis_secure_password_replace_me

          # Wait for PostgreSQL to accept connections before starting backend
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker exec mock-postgres pg_isready -U lifepilot_user -d lifepilot_db 2>/dev/null; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: PostgreSQL did not become ready within 30 seconds"
              exit 1
            fi
            sleep 1
          done

          # Spin up the backend container connected to Postgres & Redis
          docker run -d --name test-backend-run \
            -p 8000:8000 \
            --link mock-postgres:postgres \
            --link mock-redis:redis \
            -e ENVIRONMENT=local \
            -e DATABASE_URL=postgresql+asyncpg://lifepilot_user:lifepilot_secure_password_replace_me@mock-postgres:5432/lifepilot_db \
            -e REDIS_URL=redis://:redis_secure_password_replace_me@mock-redis:6379/0 \
            -e EMBEDDING_PROVIDER=mock \
            lifepilot-backend:test

          # Poll /ping (pure liveness — always HTTP 200 when uvicorn is running).
          # Heavy packages (torch, sentence-transformers, chromadb) can take 15-30s
          # to import on a fresh CI runner; 60s budget is generous but reliable.
          echo "Waiting for backend uvicorn to become ready..."
          READY=0
          for i in $(seq 1 60); do
            if docker exec test-backend-run python3 -c \
              "import urllib.request, sys; urllib.request.urlopen('http://localhost:8000/ping'); sys.exit(0)" \
              2>/dev/null; then
              echo "Backend is ready after ${i}s"
              READY=1
              break
            fi
            sleep 1
          done

          if [ "$READY" -eq 0 ]; then
            echo "ERROR: Backend did not become ready within 60 seconds"
            docker logs test-backend-run
            docker stop test-backend-run mock-postgres mock-redis || true
            docker rm test-backend-run mock-postgres mock-redis || true
            exit 1
          fi

          # Show backend logs for visibility
          docker logs test-backend-run

          # Confirm /ping returns HTTP 200 (liveness)
          docker exec test-backend-run python3 -c "
          import urllib.request, sys
          res = urllib.request.urlopen('http://localhost:8000/ping')
          data = res.read()
          print('/ping response:', data)
          sys.exit(0 if res.status == 200 else 1)
          "

          # Confirm /health responds (server is alive).
          # HTTP 200 = fully healthy; HTTP 503 = server up but a dependency is
          # warming — both are acceptable for this container spin-up verification.
          docker exec test-backend-run python3 -c "
          import urllib.request, urllib.error, sys
          try:
              res = urllib.request.urlopen('http://localhost:8000/health')
              data = res.read()
              print('/health response (200):', data)
              sys.exit(0)
          except urllib.error.HTTPError as e:
              data = e.read()
              print('/health response (' + str(e.code) + '):', data)
              # 503 is acceptable: server is up but DB/Redis still initialising
              sys.exit(0 if e.code == 503 else 1)
          "

          # Cleanup containers
          docker stop test-backend-run mock-postgres mock-redis
          docker rm test-backend-run mock-postgres mock-redis
